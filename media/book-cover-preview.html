<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0;background:#333;display:flex;gap:20px;padding:20px}</style></head>
<body>
<div id="a"></div><div id="b"></div>
<script>
function bookCoverSvg(name){
  var fs = name.length > 20 ? 20 : name.length > 14 ? 25 : 30;
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">'
  +'<defs>'
  +'<linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#332614"/><stop offset=".45" stop-color="#54401f"/><stop offset="1" stop-color="#241a0e"/></linearGradient>'
  +'<linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4dd94"/><stop offset=".5" stop-color="#c9a44e"/><stop offset="1" stop-color="#eec969"/></linearGradient>'
  +'</defs>'
  +'<rect width="512" height="512" fill="#0e1116"/>'
  +'<rect x="76" y="36" width="360" height="440" rx="14" fill="url(#c)"/>'
  +'<rect x="76" y="36" width="360" height="440" rx="14" fill="none" stroke="url(#g)" stroke-width="3"/>'
  +'<rect x="92" y="52" width="328" height="408" rx="9" fill="none" stroke="#c9a44e" stroke-width="1.2" opacity=".65"/>'
  +'<rect x="100" y="36" width="5" height="440" fill="#160f08" opacity=".55"/>'
  +'<g transform="translate(256,148)">'
  +'<path d="M0 -50 C 30 -20, 25 16, 0 52 C -25 16, -30 -20, 0 -50 Z" fill="url(#g)"/>'
  +'<circle cx="0" cy="4" r="7.5" fill="#241a0e"/>'
  +'<path d="M0 12 L0 50" stroke="#241a0e" stroke-width="4.5"/>'
  +'</g>'
  +'<text x="256" y="258" text-anchor="middle" font-family="Georgia,serif" font-size="37" letter-spacing="7" fill="url(#g)">LEDGER BOOK</text>'
  +'<text x="256" y="318" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="'+fs+'" fill="#f4e8c8">'+name.replace(/&/g,"&amp;").replace(/</g,"&lt;")+'</text>'
  +'<path d="M140 338 H372" stroke="#c9a44e" stroke-width="1.4" opacity=".8"/>'
  +'<g stroke="#e8c35a" stroke-width="2.2" fill="none" opacity=".8" stroke-linecap="round">'
  +'<path d="M150 382 c 14 -12, 22 8, 34 -2 s 26 6, 44 -4"/>'
  +'<path d="M262 384 c 12 -10, 26 6, 40 -4 s 20 8, 34 -2"/>'
  +'<path d="M176 412 c 16 -10, 30 8, 48 -4 s 30 8, 52 -4"/>'
  +'<path d="M288 414 c 10 -8, 22 6, 34 -3"/>'
  +'</g>'
  +'<text x="256" y="452" text-anchor="middle" font-family="Georgia,serif" font-size="13" letter-spacing="4" fill="#c9a44e">SIGNED FOREVER · ON CARDANO</text>'
  +'</svg>';
}
document.getElementById('a').innerHTML=bookCoverSvg('BEACN Guestbook');
document.getElementById('b').innerHTML=bookCoverSvg('The Very Long Book Name Test');
document.querySelectorAll('svg').forEach(function(s){s.setAttribute('width',480);s.setAttribute('height',480);});
console.log('svg bytes:',bookCoverSvg('BEACN Guestbook').length);
</script>
</body></html>
