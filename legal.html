<script>
"use strict";
const SOURCES=['https://api.koios.rest/api/v1','https://koios.beacn.workers.dev/api/v1'];
let DOCKET='97d3659dec8c60f69464959ab2156c64d74408d8950fea109c4d95e4';
const $=id=>document.getElementById(id);
const esc=v=>String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const st=(cls,m)=>{const s=$('status'),t=$('technical');t.style.display='block';if(cls==='er')t.open=true;s.style.display='block';const d=document.createElement('div');d.className=cls;d.textContent=m;s.appendChild(d);s.scrollTop=1e9;};
const hex2b=h=>{h=String(h).replace(/^0x/i,'');const b=new Uint8Array(h.length/2);for(let i=0;i<h.length;i+=2)b[i/2]=parseInt(h.substr(i,2),16);return b;};
const b2hex=b=>Array.from(b).map(x=>x.toString(16).padStart(2,'0')).join('');
const sha256=async b=>b2hex(new Uint8Array(await crypto.subtle.digest('SHA-256',b)));
const segHex=s=>{if(s&&typeof s==='object')s=s.bytes??s.seg??'';s=String(s).trim();return s.toLowerCase().startsWith('0x')?s.slice(2):s;};
const td=new TextDecoder();
async function gunzip(b){const ds=new Blob([b]).stream().pipeThrough(new DecompressionStream('gzip'));return new Uint8Array(await new Response(ds).arrayBuffer());}
async function api(path,body){let last;for(const base of SOURCES){try{const r=await fetch(base+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}catch(e){last=e;st('er',`${base} → ${e.message}`);}}throw last;}
function cbor(raw,pos=0){const len=(ai,p)=>{if(ai<24)return[ai,p];const w={24:1,25:2,26:4,27:8}[ai];let n=0;for(let i=0;i<w;i++)n=n*256+raw[p+i];return[n,p+w];};
 const mt=raw[pos]>>5,ai=raw[pos]&31;
 if(mt===0)return len(ai,pos+1);
 if(mt===1){const[n,p]=len(ai,pos+1);return[-1-n,p];}
 if(mt===2||mt===3){if(ai===31){let p=pos+1;const ps=[];while(raw[p]!==0xff){const[n,q]=len(raw[p]&31,p+1);ps.push(raw.subarray(q,q+n));p=q+n;}const t=ps.reduce((a,b)=>a+b.length,0);const o=new Uint8Array(t);let z=0;for(const x of ps){o.set(x,z);z+=x.length;}return[mt===2?o:td.decode(o),p+1];}
  const[n,p]=len(ai,pos+1);const v=raw.subarray(p,p+n);return[mt===2?v:td.decode(v),p+n];}
 if(mt===4){let[n,p]=ai===31?[Infinity,pos+1]:len(ai,pos+1);const o=[];for(let i=0;i<n;i++){if(ai===31&&raw[p]===0xff){p++;break;}const[v,q]=cbor(raw,p);o.push(v);p=q;}return[o,p];}
 if(mt===6){const[n,p]=len(ai,pos+1);const[v,q]=cbor(raw,p);return[{tag:n,value:v},q];}
 throw new Error('cbor major '+mt);}

let bytesOut=null,urlOut=null,nameOut='document',typeOut='application/octet-stream';
const KNOWN={
  ef91a425ef57d92db614085ef03718407fb293cb4b770bc6e03f9750:{title:'Cardano Constitution — Epoch 608',type:'text/plain; charset=utf-8',sha:'98a29aec8664b62912c1c0355ebae1401b7c0e53d632e8f05479e7821935abf1'},
  d7559bbfa87f53674570fd01f564687c2954503b510ead009148a31d:{title:'Cardano Constitution — Epoch 541',type:'text/plain; charset=utf-8',sha:'1939c1627e49b5267114cbdb195d4ac417e545544ba6dcb47e03c679439e9566'}
};

function resetResults(){
  $('status').innerHTML='';$('status').style.display='block';$('technical').style.display='none';$('technical').open=false;
  $('summary').style.display='none';$('summary').innerHTML='';
  $('doclist').style.display='none';$('doclist').innerHTML='';
  $('cert').style.display='none';$('cert').open=false;$('certtbl').innerHTML='';
  $('stage').style.display='none';$('stage').innerHTML='';
  $('actions').style.display='none';
}
async function assetInfos(policy,names){
  const out=[];
  for(let i=0;i<names.length;i+=50){
    st('ok',`  reading asset metadata ${Math.min(i+50,names.length)}/${names.length}`);
    out.push(...await api('/asset_info',{_asset_list:names.slice(i,i+50).map(n=>[policy,n])}));
  }
  return out;
}
function policyMeta(inf,policy){
  const data=inf.minting_tx_metadata?.['721']?.[policy];
  if(!data||typeof data!=='object')return null;
  const ascii=inf.asset_name_ascii||td.decode(hex2b(inf.asset_name||''));
  return data[ascii]??data[inf.asset_name]??null;
}
function parseManifest(dHex){
  const[m]=cbor(hex2b(dHex));
  if(!m||m.tag!==121||!Array.isArray(m.value)||m.value[0]!==2)throw new Error('invalid scroll manifest');
  const f=m.value,n=f[7];
  return{ct:td.decode(f[1]),codec:td.decode(f[2]),size:f[3],shaDec:b2hex(f[4]),shaEnc:b2hex(f[5]),
    pages:f[6].map(b2hex),next:n&&n.tag===122?`${b2hex(n.value[0])}#${n.value[1]}`:null};
}
async function manifestInfo(txin){
  let rows=await api('/utxo_info',{_utxo_refs:[txin],_extended:true});
  let man=parseManifest(rows?.[0]?.inline_datum?.bytes||'');
  const pages=[...man.pages];let next=man.next;
  while(next){
    rows=await api('/utxo_info',{_utxo_refs:[next],_extended:true});
    const more=parseManifest(rows?.[0]?.inline_datum?.bytes||'');
    pages.push(...more.pages);next=more.next;
  }
  return{...man,pages};
}
function sniff(b){
  if(b[0]===0x25&&b[1]===0x50&&b[2]===0x44&&b[3]===0x46)return'application/pdf';
  if(b[0]===0x89&&b[1]===0x50)return'image/png';
  try{const s=td.decode(b.subarray(0,400));if(/<!doctype html|<html/i.test(s))return'text/html';if(!/[\x00-\x08\x0e-\x1f]/.test(s))return'text/plain';}catch(e){void e;}
  return'application/octet-stream';
}
function renderBytes(bytes,type,name){
  bytesOut=bytes;typeOut=(type||sniff(bytes)).split(';')[0].trim();nameOut=name||'document';
  if(urlOut)URL.revokeObjectURL(urlOut);
  urlOut=URL.createObjectURL(new Blob([bytes],{type:typeOut}));
  const stage=$('stage');stage.innerHTML='';stage.style.display='block';
  if(typeOut==='text/html'||typeOut==='application/pdf'){const fr=document.createElement('iframe');fr.setAttribute('sandbox','');fr.src=urlOut;fr.title='verified legal document';stage.appendChild(fr);}
  else if(typeOut.startsWith('image/')){const im=document.createElement('img');im.src=urlOut;stage.appendChild(im);}
  else{const pre=document.createElement('pre');pre.textContent=typeOut.startsWith('text/')?td.decode(bytes):`(${typeOut}) — download to view`;stage.appendChild(pre);}
  $('actions').style.display='flex';
}
function certificate(rows){
  $('certtbl').innerHTML=rows.map(([k,v,raw])=>`<tr><td>${esc(k)}</td><td>${raw?v:esc(v)}</td></tr>`).join('');
  $('cert').style.display='block';
}
async function openPointerDoc(doc,policy){
  $('status').innerHTML='';$('technical').style.display='none';$('technical').open=false;$('status').style.display='block';$('cert').style.display='none';$('cert').open=false;$('stage').style.display='none';$('actions').style.display='none';
  try{
    st('ok',`── opening ${doc.title}`);
    const man=doc.manifest||await manifestInfo(doc.txin);
    st('ok',`  ${man.pages.length} on-chain page(s)`);
    const rows=await api('/tx_metadata',{_tx_hashes:man.pages});
    const byTx={};for(const r of rows||[])byTx[r.tx_hash]=r.metadata||{};
    let hexAll='';
    for(let i=0;i<man.pages.length;i++){
      const pg=byTx[man.pages[i]]?.['22025']??byTx[man.pages[i]]?.[22025];
      if(!pg?.p)throw new Error(`page ${i+1} missing`);
      const ph=pg.p.map(segHex).join('');
      if(pg.sha&&await sha256(hex2b(ph))!==segHex(pg.sha).toLowerCase())throw new Error(`page ${i+1} seal mismatch`);
      hexAll+=ph;
    }
    let bytes=hex2b(hexAll);
    if(await sha256(bytes)!==man.shaEnc)throw new Error('encoded seal mismatch');
    if(man.codec==='gzip')bytes=await gunzip(bytes);
    const got=await sha256(bytes);
    const expected=segHex(doc.meta.sha256||man.shaDec).toLowerCase();
    if(got!==expected)throw new Error('document seal mismatch');
    st('ok',`  SHA-256 verified ✓ ${got}`);
    const when=doc.inf.creation_time?new Date((typeof doc.inf.creation_time==='number'?doc.inf.creation_time*1000:doc.inf.creation_time)).toUTCString():'(pending)';
    certificate([
      ['DOCUMENT',doc.title],['STATUS','<span class="ok">RECORDED · HASH VERIFIED ✓</span>',true],
      ['ON-CHAIN PAGES',String(man.pages.length)],['DATE OF RECORD',when],
      ['RECORDING TX',doc.inf.minting_tx_hash],['POLICY ID',policy],['SHA-256',got],['POINTER',doc.txin]
    ]);
    renderBytes(bytes,doc.meta.mediaType||man.ct,doc.asset.toLowerCase());
  }catch(e){st('er','FAILED: '+(e.message||e));certificate([['STATUS',`<span class="no">✗ ${esc(e.message||e)}</span>`,true]]);}
}
async function openLegacy(policy,infos){
  let codec='auto',ctype=KNOWN[policy]?.type,expected='',title=KNOWN[policy]?.title||`Document under ${policy.slice(0,12)}…`;
  const pages=[];
  for(const inf of infos){
    const meta=policyMeta(inf,policy);if(!meta)continue;
    const ascii=inf.asset_name_ascii||td.decode(hex2b(inf.asset_name||''));
    if(meta.codec)codec=meta.codec;else if(meta.compression)codec=meta.compression;
    const mt=meta.mediaType||meta.contentType||meta.mimeType||meta.ct;
    const isManifest=meta.role==='manifest'||ascii.toUpperCase().includes('MANIFEST')||Array.isArray(meta.pages);
    if(isManifest){
      if(mt)ctype=mt;if(meta.name)title=meta.name;
      expected=segHex(meta.sha_html||meta.sha256||expected).toLowerCase();continue;
    }
    const payload=meta.payload??meta.segments??meta.seg;
    if(payload===undefined||meta.i===undefined)continue;
    const hex=(Array.isArray(payload)?payload:[payload]).map(segHex).join('');
    if(meta.sha&&await sha256(hex2b(hex))!==segHex(meta.sha).toLowerCase())throw new Error(`page ${meta.i} hash mismatch`);
    pages.push({i:parseInt(meta.i),hex});
  }
  if(!pages.length)throw new Error('no readable document pages found under this policy');
  pages.sort((a,b)=>a.i-b.i);
  $('summary').innerHTML=`<b>1 document</b> · ${pages.length} on-chain page${pages.length===1?'':'s'}`;$('summary').style.display='block';
  st('ok',`── reconstructing ${pages.length} on-chain pages`);
  let bytes=hex2b(pages.map(p=>p.hex).join(''));
  if(codec==='gzip'||((codec==='auto'||!codec)&&bytes[0]===0x1f&&bytes[1]===0x8b))bytes=await gunzip(bytes);
  const got=await sha256(bytes);
  expected=expected||KNOWN[policy]?.sha||'';
  if(expected&&got!==expected)throw new Error(`document hash mismatch: expected ${expected}, got ${got}`);
  st('ok',`  SHA-256 ${expected?'verified ✓':'computed'} ${got}`);
  certificate([
    ['DOCUMENT',title],['STATUS',expected?'<span class="ok">ON-CHAIN PAGES · HASH VERIFIED ✓</span>':'<span class="ok">ON-CHAIN PAGES RECONSTRUCTED ✓</span>',true],
    ['ON-CHAIN PAGES',String(pages.length)],['POLICY ID',policy],['SHA-256',got]
  ]);
  renderBytes(bytes,ctype,title.toLowerCase().replace(/[^a-z0-9]+/g,'-'));
}
async function readPolicy(){
  const policy=$('docket').value.trim().toLowerCase();
  if(!/^[0-9a-f]{56}$/.test(policy)){alert('enter a 56-character policy ID');return;}
  DOCKET=policy;$('pull').disabled=true;resetResults();history.replaceState(null,'',`#policy=${policy}`);
  try{
    st('ok',`── searching policy ${policy}`);
    const list=await api('/policy_asset_list',{_asset_policy:policy});
    if(!list?.length)throw new Error('no assets found under this policy');
    st('ok',`  ${list.length} on-chain asset(s) found`);
    const infos=await assetInfos(policy,list.map(a=>a.asset_name??''));
    const docs=[];
    for(const inf of infos){
      const meta=policyMeta(inf,policy);
      if(meta?.pointer?.txHash)docs.push({inf,meta,asset:inf.asset_name_ascii||inf.asset_name,
        title:meta.name||inf.asset_name_ascii||'Untitled document',txin:`${meta.pointer.txHash}#${meta.pointer.txIx||0}`});
    }
    if(docs.length){
      await Promise.all(docs.map(async d=>{d.manifest=await manifestInfo(d.txin);}));
      const total=docs.reduce((n,d)=>n+d.manifest.pages.length,0);
      $('summary').innerHTML=`<b>${docs.length} document${docs.length===1?'':'s'}</b> · ${total} on-chain page${total===1?'':'s'}`;$('summary').style.display='block';
      $('doclist').style.display='grid';
      for(const doc of docs){
        const b=document.createElement('button');b.className='doc';
        b.innerHTML=`<b></b><span>${doc.manifest.pages.length} on-chain page${doc.manifest.pages.length===1?'':'s'}</span>`;
        b.querySelector('b').textContent=doc.title;b.onclick=()=>openPointerDoc(doc,policy);$('doclist').appendChild(b);
      }
      await openPointerDoc(docs[0],policy);
    }else await openLegacy(policy,infos);
  }catch(e){
    st('er','FAILED: '+(e.message||e));certificate([['STATUS',`<span class="no">✗ ${esc(e.message||e)}</span>`,true]]);
  }finally{$('pull').disabled=false;}
}

$('pull').onclick=readPolicy;
$('example').onchange=()=>{const v=$('example').value;$('docket').value=v;if(!v)$('docket').focus();};
$('docket').addEventListener('input',()=>{if($('example').value!==$('docket').value)$('example').value='';});
$('docket').addEventListener('keydown',e=>{if(e.key==='Enter')readPolicy();});
